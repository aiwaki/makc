name: Bug report
description: Report a reproducible makc bug.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: makc version or commit.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: backend
    attributes:
      label: Backend
      description: The backend involved, if known.
      placeholder: InjectMouseInput, SendInput, CGEvent, uinput, evdev, Raw Input
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal code, command, or steps to reproduce.
      render: sh
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or diagnostics
      description: Include `makc-smoke -runtime-info` output when useful.
      render: text
